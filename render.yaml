services:
  - type: web
    name: hr-secret-vote
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /var/data
      - key: PORT
        value: 10000
    disk:
      name: vote-data
      mountPath: /var/data
      sizeGB: 5
